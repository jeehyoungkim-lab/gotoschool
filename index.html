<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>출석 QR 시스템 데모</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    label {
      display: block;
      margin-top: 8px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      background: #9ca3af;
      cursor: default;
    }
    #qr {
      margin-top: 16px;
      text-align: center;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #4b5563;
    }
    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
  <!-- QR 코드 라이브러리 (qrcodejs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <h1>출석 QR 시스템 데모</h1>
  <div class="card">
    <div id="login-section">
      <p>지문 인증으로 로그인한 뒤, 출석용 QR을 생성합니다.</p>
      <button id="login-btn">지문 로그인 (데모)</button>
      <div class="small">
        실제 환경에서는 WebAuthn(FIDO2)로 지문/얼굴 인증을 붙이면 됩니다.
      </div>
    </div>

    <div id="id-section" style="display:none;">
      <label for="userId">학번/사번을 입력하세요 (최초 1회)</label>
      <input id="userId" type="text" placeholder="예: 202312345" />
      <button id="save-id-btn">저장하고 계속</button>
    </div>

    <div id="qr-section" style="display:none;">
      <div id="qr"></div>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const loginBtn = document.getElementById('login-btn');
    const idSection = document.getElementById('id-section');
    const qrSection = document.getElementById('qr-section');
    const saveIdBtn = document.getElementById('save-id-btn');
    const userIdInput = document.getElementById('userId');
    const statusEl = document.getElementById('status');
    const qrContainer = document.getElementById('qr');

    let qrInstance = null;
    let qrTimer = null;

    // 특수기호 목록
    const SPECIAL_CHARS = ['!', '@', '#', '$', '%', '^', '&', '*', '-', '_', '+', '='];

    // Base32 인코딩 (RFC 4648, 패딩 포함)
    function base32Encode(str) {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      let bits = '';
      let result = '';

      for (let i = 0; i < str.length; i++) {
        const bin = str.charCodeAt(i).toString(2).padStart(8, '0');
        bits += bin;
      }

      for (let i = 0; i < bits.length; i += 5) {
        const chunk = bits.substring(i, i + 5);
        if (chunk.length < 5) {
          const padded = chunk.padEnd(5, '0');
          result += alphabet[parseInt(padded, 2)];
        } else {
          result += alphabet[parseInt(chunk, 2)];
        }
      }

      while (result.length % 8 !== 0) {
        result += '=';
      }

      return result;
    }

    // 랜덤 위치에 랜덤 특수기호 삽입
    function insertRandomSpecialChars(base32Str, count = 3) {
      let chars = base32Str.split('');
      for (let i = 0; i < count; i++) {
        const pos = Math.floor(Math.random() * (chars.length + 1));
        const sym = SPECIAL_CHARS[Math.floor(Math.random() * SPECIAL_CHARS.length)];
        chars.splice(pos, 0, sym);
      }
      return chars.join('');
    }

    // 오늘 날짜를 YYYYMMDD로 반환
    function getTodayYYYYMMDD() {
      const d = new Date();
      const y = d.getFullYear().toString();
      const m = (d.getMonth() + 1).toString().padStart(2, '0');
      const day = d.getDate().toString().padStart(2, '0');
      return y + m + day;
    }

    // 문자열 뒤집기
    function reverseString(s) {
      return s.split('').reverse().join('');
    }

    // QR 생성 로직
    function generateQrForUser(userId) {
      // 1) 뒤집힌 날짜
      const today = getTodayYYYYMMDD();      // 예: 20260314
      const reversedDate = reverseString(today); // 예: 41306202

      // 2) timestamp (초 단위)
      const timestamp = Math.floor(Date.now() / 1000); // 예: 1710412345

      // 3) 원본 데이터 구성: 뒤집힌날짜|학번|timestamp
      const raw = `${reversedDate}|${userId}|${timestamp}`;

      // 4) Base32 인코딩
      const b32 = base32Encode(raw);

      // 5) 랜덤 위치에 랜덤 특수기호 삽입
      const obfuscated = insertRandomSpecialChars(b32, 4);

      // 6) QR 생성
      if (qrInstance) {
        qrContainer.innerHTML = '';
      }
      qrInstance = new QRCode(qrContainer, {
        text: obfuscated,
        width: 256,
        height: 256
      });

      // 7) 15초 타이머
      if (qrTimer) clearTimeout(qrTimer);
      statusEl.textContent = '이 QR은 15초 동안만 유효합니다.';
      qrTimer = setTimeout(() => {
        qrContainer.innerHTML = '';
        statusEl.textContent = 'QR이 만료되었습니다. 다시 로그인하여 새 QR을 생성하세요.';
      }, 15000);
    }

    // 지문 로그인 버튼 (데모용)
    loginBtn.addEventListener('click', async () => {
      // 실제 환경에서는 여기서 WebAuthn(FIDO2) 호출
      // navigator.credentials.get({ publicKey: { ... } })

      // 데모에서는 그냥 "로그인 성공"으로 처리
      const storedId = localStorage.getItem('attendance_user_id');
      if (!storedId) {
        // 최초 로그인: 학번/사번 입력 단계로
        idSection.style.display = 'block';
      } else {
        // 이미 학번/사번 등록된 경우 바로 QR 생성
        idSection.style.display = 'none';
        qrSection.style.display = 'block';
        generateQrForUser(storedId);
      }
    });

    // 학번/사번 저장 버튼
    saveIdBtn.addEventListener('click', () => {
      const v = userIdInput.value.trim();
      if (!v) {
        alert('학번/사번을 입력하세요.');
        return;
      }
      localStorage.setItem('attendance_user_id', v);
      idSection.style.display = 'none';
      qrSection.style.display = 'block';
      generateQrForUser(v);
    });
  </script>
</body>
</html>
