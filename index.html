<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석 QR</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  margin: 0;
  padding: 0;
  background: #f3f4f6;
  color: #111827;
  /* 1. 고정 높이가 아닌 최소 높이로 설정 */
  min-height: 100dvh; 
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  /* 2. 요소들이 많아지면 중앙 정렬보다는 위쪽 정렬이 안전함 */
  justify-content: flex-start; 
  align-items: center;
  /* 3. 모바일 주소창 및 하단 여백 대비 */
  padding: 10vw 5vw 15vw 5vw; 
  text-align: center;
  box-sizing: border-box;
}

    h1 {
      font-size: 8vw;
      margin-bottom: 5vw;
      font-weight: 700;
      color: #1f2937;
    }
    p {
      font-size: 4.5vw;
      margin-bottom: 4vw;
      color: #4b5563;
    }
    .label {
      font-size: 4vw;
      margin-top: 3vw;
      margin-bottom: 1vw;
      color: #374151;
      text-align: left;
      width: 85%;
    }
    input {
      width: 85%;
      padding: 3.5vw;
      font-size: 5vw;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      margin-bottom: 2vw;
      background: white;
      box-sizing: border-box;
    }
    input[readonly] {
      background: #e5e7eb;
      color: #6b7280;
    }
    button {
      width: 85%;
      padding: 4vw;
      font-size: 5.2vw;
      border-radius: 14px;
      border: none;
      background: #2563eb;
      color: white;
      margin-top: 5vw;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }
    button:active {
      background: #1e4fc7;
    }
    #qr {
      margin-top: 6vw;
    }
    #status {
      margin-top: 4vw;
      font-size: 4vw;
      color: #6b7280;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>출석 QR</h1>

    <div id="first-section" style="display:none;">
      <p>이름은 한 번만 설정할 수 있습니다.</p>

      <div class="label">이름 (고정)</div>
      <input id="name-input" type="text" placeholder="예: 홍길동" />

      <div class="label">소속 (수정 가능)</div>
      <input id="dept-input" type="text" placeholder="예: 한국대학교 컴퓨터공학과" />

      <button id="save-first-btn">저장하고 QR 생성</button>
    </div>

    <div id="main-section" style="display:none;">
      <p id="greeting"></p>

      <div class="label">이름 (수정 불가)</div>
      <input id="name-fixed" type="text" readonly />

      <div class="label">소속 (수정 가능)</div>
      <input id="dept-edit" type="text" placeholder="예: 한국대학교 컴퓨터공학과" />

      <button id="generate-btn">QR 생성하기</button>
    </div>

    <div id="qr-section" style="display:none;">
      <div id="qr"></div>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const firstSection = document.getElementById('first-section');
    const mainSection = document.getElementById('main-section');
    const qrSection = document.getElementById('qr-section');

    const nameInput = document.getElementById('name-input');
    const deptInput = document.getElementById('dept-input');
    const saveFirstBtn = document.getElementById('save-first-btn');

    const nameFixed = document.getElementById('name-fixed');
    const deptEdit = document.getElementById('dept-edit');
    const generateBtn = document.getElementById('generate-btn');
    const greetingEl = document.getElementById('greeting');

    const qrContainer = document.getElementById('qr');
    const statusEl = document.getElementById('status');

    let qrInstance = null;
    let qrTimer = null;

    // 세미콜론(;) 제외 특수문자
    const SPECIAL_CHARS = ['#', '&', '%'];

    function toHex(str) {
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      let hex = '';
      for (let b of bytes) {
        hex += b.toString(16).padStart(2, '0').toUpperCase();
      }
      return hex;
    }

    function insertRandomSpecialChars(str, count = 4) {
      let chars = str.split('');
      for (let i = 0; i < count; i++) {
        const pos = Math.floor(Math.random() * (chars.length + 1));
        const sym = SPECIAL_CHARS[Math.floor(Math.random() * SPECIAL_CHARS.length)];
        chars.splice(pos, 0, sym);
      }
      return chars.join('');
    }

    function getDateTimeString() {
      const d = new Date();
      const y = d.getFullYear().toString();
      const m = (d.getMonth() + 1).toString().padStart(2, '0');
      const day = d.getDate().toString().padStart(2, '0');
      const hh = d.getHours().toString().padStart(2, '0');
      const mm = d.getMinutes().toString().padStart(2, '0');
      const ss = d.getSeconds().toString().padStart(2, '0');
      return y + m + day + hh + mm + ss; // YYYYMMDDHHMMSS
    }

    function generateQr(name, dept) {
  const dt = getDateTimeString();
  
  // 1. 날짜시간 문자열 뒤집기 (암호화 효과)
  const reversedDt = dt.split('').reverse().join('');
  
  // 2. 한글 데이터를 변환 없이 그대로 합치기
  const raw = `${reversedDt}|${name}|${dept}`;

  // 3. 무작위 특수문자 삽입
  const obfuscated = insertRandomSpecialChars(raw, 4);

  if (qrInstance) {
    qrContainer.innerHTML = '';
  }
  qrInstance = new QRCode(qrContainer, {
    text: obfuscated, // 한글이 포함된 문자열 그대로 생성
    width: 240,       // 모바일 대응을 위해 크기 살짝 조절
    height: 240
  });

  if (qrTimer) clearTimeout(qrTimer);
  statusEl.textContent = '이 QR은 10초 동안만 유효합니다.'; // 시간은 편의에 따라 조절하세요
  qrTimer = setTimeout(() => {
    qrContainer.innerHTML = '';
    statusEl.textContent = 'QR이 만료되었습니다. 다시 생성하세요.';
  }, 10000);

  qrSection.style.display = 'block';
  // 생성 즉시 QR 위치로 화면 이동 (잘림 방지)
  qrSection.scrollIntoView({ behavior: 'smooth', block: 'end' });
}


    // 초기 로드: 이름 저장 여부 확인
    window.addEventListener('load', () => {
      const storedName = localStorage.getItem('attendance_name');
      const storedDept = localStorage.getItem('attendance_dept') || '';

      if (!storedName) {
        firstSection.style.display = 'block';
      } else {
        mainSection.style.display = 'block';
        nameFixed.value = storedName;
        deptEdit.value = storedDept;
        greetingEl.textContent = `${storedName} 님, 출석 QR을 생성할 수 있습니다.`;
      }
    });

    // 첫 설정: 이름(고정) + 소속(수정 가능)
    saveFirstBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      const dept = deptInput.value.trim();

      if (!name) {
        alert('이름을 입력하세요.');
        return;
      }

      localStorage.setItem('attendance_name', name);
      localStorage.setItem('attendance_dept', dept);

      firstSection.style.display = 'none';
      mainSection.style.display = 'block';

      nameFixed.value = name;
      deptEdit.value = dept;
      greetingEl.textContent = `${name} 님, 출석 QR을 생성할 수 있습니다.`;

      generateQr(name, dept);
    });

    // 이후: 이름은 고정, 소속은 수정 가능
    generateBtn.addEventListener('click', () => {
      const name = localStorage.getItem('attendance_name');
      let dept = deptEdit.value.trim();

      if (!name) {
        alert('이름 정보가 없습니다. 페이지를 새로고침 해주세요.');
        return;
      }

      localStorage.setItem('attendance_dept', dept);
      generateQr(name, dept);
    });
  </script>
</body>
</html>
