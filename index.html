<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>출석 QR</title>

  <!-- 홈 화면 앱 아이콘 -->
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- 웹앱 매니페스트 -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS 전체 화면 모드 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  margin: 0;
  padding: 0;
  background: #f3f4f6;
  display: flex;
  flex-direction: column;
  height: 100vh;
  color: #111827;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 5vw;
  text-align: center;
}

h1 {
  font-size: 8vw;
  margin-bottom: 5vw;
  font-weight: 700;
  color: #1f2937;
}

p {
  font-size: 4.5vw;
  margin-bottom: 4vw;
  color: #4b5563;
}

input {
  width: 85%;
  padding: 3.5vw;
  font-size: 5vw;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  margin-top: 2vw;
  background: white;
}

button {
  width: 85%;
  padding: 4vw;
  font-size: 5.2vw;
  border-radius: 14px;
  border: none;
  background: #2563eb;
  color: white;
  margin-top: 5vw;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
}

button:active {
  background: #1e4fc7;
}

#qr {
  margin-top: 6vw;
}

#status {
  margin-top: 4vw;
  font-size: 4vw;
  color: #6b7280;
}

  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
  <div class="container">

    <h1>출석 QR</h1>

    <div id="login-section">
      <p>지문 인증 후 QR을 생성합니다.</p>
      <button id="login-btn">QR 생성하기</button>
    </div>

    <div id="id-section" style="display:none;">
      <p>학번/사번을 입력하세요</p>
      <input id="userId" type="text" placeholder="예: 202312345" />
      <button id="save-id-btn">저장</button>
    </div>

    <div id="qr-section" style="display:none;">
      <div id="qr"></div>
      <div id="status"></div>
    </div>

  </div>

  <script>
    const loginBtn = document.getElementById('login-btn');
    const idSection = document.getElementById('id-section');
    const qrSection = document.getElementById('qr-section');
    const saveIdBtn = document.getElementById('save-id-btn');
    const userIdInput = document.getElementById('userId');
    const statusEl = document.getElementById('status');
    const qrContainer = document.getElementById('qr');

    let qrInstance = null;
    let qrTimer = null;

    const SPECIAL_CHARS = ['!', '@', '#', '$', '%', '^', '&', '*', '-', '_', '+', '='];

    function base32Encode(str) {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      let bits = '';
      let result = '';

      for (let i = 0; i < str.length; i++) {
        bits += str.charCodeAt(i).toString(2).padStart(8, '0');
      }

      for (let i = 0; i < bits.length; i += 5) {
        const chunk = bits.substring(i, i + 5);
        const padded = chunk.padEnd(5, '0');
        result += alphabet[parseInt(padded, 2)];
      }

      while (result.length % 8 !== 0) result += '=';
      return result;
    }

    function insertRandomSpecialChars(str, count = 4) {
      let chars = str.split('');
      for (let i = 0; i < count; i++) {
        const pos = Math.floor(Math.random() * (chars.length + 1));
        const sym = SPECIAL_CHARS[Math.floor(Math.random() * SPECIAL_CHARS.length)];
        chars.splice(pos, 0, sym);
      }
      return chars.join('');
    }

    function getTodayYYYYMMDD() {
      const d = new Date();
      return (
        d.getFullYear().toString() +
        (d.getMonth() + 1).toString().padStart(2, '0') +
        d.getDate().toString().padStart(2, '0')
      );
    }

    function reverseString(s) {
      return s.split('').reverse().join('');
    }

    function generateQrForUser(userId) {
      const today = getTodayYYYYMMDD();
      const reversedDate = reverseString(today);
      const timestamp = Math.floor(Date.now() / 1000);

      const raw = `${reversedDate}|${userId}|${timestamp}`;
      const b32 = base32Encode(raw);
      const obfuscated = insertRandomSpecialChars(b32, 4);

      if (qrInstance) qrContainer.innerHTML = '';
      qrInstance = new QRCode(qrContainer, {
        text: obfuscated,
        width: 260,
        height: 260
      });

      if (qrTimer) clearTimeout(qrTimer);
      statusEl.textContent = '이 QR은 15초 동안만 유효합니다.';
      qrTimer = setTimeout(() => {
        qrContainer.innerHTML = '';
        statusEl.textContent = 'QR이 만료되었습니다. 다시 로그인하세요.';
      }, 15000);
    }

    loginBtn.addEventListener('click', () => {
      const storedId = localStorage.getItem('attendance_user_id');
      if (!storedId) {
        idSection.style.display = 'block';
      } else {
        idSection.style.display = 'none';
        qrSection.style.display = 'block';
        generateQrForUser(storedId);
      }
    });

    saveIdBtn.addEventListener('click', () => {
      const v = userIdInput.value.trim();
      if (!v) {
        alert('학번/사번을 입력하세요.');
        return;
      }
      localStorage.setItem('attendance_user_id', v);
      idSection.style.display = 'none';
      qrSection.style.display = 'block';
      generateQrForUser(v);
    });
  </script>
</body>
</html>
